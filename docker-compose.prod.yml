version: "3.8"

services:
  homeos:
    image: node:20-alpine
    container_name: HomeOS
    restart: unless-stopped
    working_dir: /app
    # env_file:
    #   - .env.homeos # Uncomment if you decide to add environment variables later
    command: /bin/sh -c "npm install && npm run build && npm start"
    environment:
      - NODE_ENV=production
      - TZ=Europe/Amsterdam
    ports:
      - "3004:3004"  # Exposed for Cloudflare Tunnel (cloudflared in appstack)
    volumes:
      - "/volume1/docker/HomeOS:/app"
      - /app/node_modules
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3004"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
